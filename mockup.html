<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomo RPG — Mockup</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════════
   Pomo RPG — visual theme (Soft Companion)
   ปรับจากธีมเดิม (chibi/pixel-art) ให้เป็นโทน "เพื่อนคู่ใจ" นุ่มนวลขึ้น:
   ตัด pixel font + เส้นขอบหนักออกทั้งหมด, ใช้ Nunito rounded ล้วน,
   การ์ด/ปุ่ม/แถบสถานะโค้งมนและใช้เงานุ่มแทนเส้นขอบ/เงาแข็งแบบเกมพิกเซล
   ══════════════════════════════════════════════════════════════════ */
:root{
  --cream:#FFFBF5;
  --ink:#453F54;
  --ink-soft:#6b6478;
  --coral-1:#FF7A59;
  --coral-2:#FF3E6C;
  --blue-gray:#8FA0C7;
  --blue-gray-dark:#5E6E96;
  --green:#4CAF82;
  --green-dark:#2F8F63;
  --pastel-green:#DCEEDD;
  --pastel-blue:#DCE7F5;
  --gold:#F0B94D;
  --danger:#E85D5D;
}
*{ box-sizing:border-box; }
body{
  font-family:'Nunito',sans-serif;
  color:var(--ink);
  margin:0;
  min-height:100vh;
  background:linear-gradient(180deg,var(--pastel-blue) 0%, var(--pastel-green) 100%);
  position:relative;
  overflow-x:hidden;
}
.pixel-font{ font-family:'Nunito',sans-serif; font-weight:900; letter-spacing:0.2px; }
.pixelated{ image-rendering:auto; }

/* เนินหญ้าเป็นฉากหลังล่างสุด — "cozy minimal scenery", ไม่บังเนื้อหา (Bottom Negative) */
#bg-scenery{
  position:fixed; left:0; right:0; bottom:0; height:120px;
  background:
    radial-gradient(ellipse 220px 90px at 15% 100%, #BFE3C4 0%, transparent 60%),
    radial-gradient(ellipse 260px 100px at 55% 100%, #CFE9D6 0%, transparent 60%),
    radial-gradient(ellipse 220px 90px at 90% 100%, #BFE3C4 0%, transparent 60%);
  z-index:0; pointer-events:none;
}

.logo-badge{
  width:26px; height:26px; border-radius:50%; flex:none;
  background:conic-gradient(from 210deg,#FF3E6C,#FF7A59,#8B6FF3,#FF3E6C);
  box-shadow:0 0 0 2px #fff, 0 2px 6px rgba(0,0,0,0.15);
}

.pixel-border{
  border:none;
  border-radius:20px;
  box-shadow:0 6px 16px rgba(69,63,84,0.14);
}
.card{
  background:var(--cream);
  border-radius:20px;
  box-shadow:0 2px 10px rgba(69,63,84,0.08);
  padding:16px;
}
.btn{
  font-weight:800; border:none; border-radius:14px; padding:12px 18px;
  cursor:pointer; transition:transform .05s ease; font-size:14px;
}
.btn:active{ transform:scale(0.97); }
.btn-primary{ color:#fff; background:linear-gradient(135deg,var(--coral-1),var(--coral-2)); box-shadow:0 4px 12px rgba(255,62,108,0.35); }
.btn-secondary{ color:var(--blue-gray-dark); background:#EDF1FA; border:2px solid var(--blue-gray); }
.btn-success{ color:#fff; background:var(--green); box-shadow:0 4px 12px rgba(47,143,99,0.32); }
.btn-danger{ color:#fff; background:var(--danger); box-shadow:0 4px 12px rgba(178,63,63,0.3); }
.btn-ghost{ color:var(--ink-soft); background:transparent; }
.btn:disabled{ opacity:0.4; cursor:not-allowed; }
.btn-block{ width:100%; }

.hpbar-track{ background:#EADFDA; border-radius:999px; height:14px; overflow:hidden; box-shadow:inset 0 1px 3px rgba(69,63,84,0.15); position:relative; }
.hpbar-fill{ height:100%; background:repeating-linear-gradient(90deg,#5FD98A 0 6px,#4CC97D 6px 12px); transition:width .3s linear; }
.hpbar-fill.low{ background:repeating-linear-gradient(90deg,#FF8A6B 0 6px,#FF6B4A 6px 12px); }
.hpbar-fill.critical{ background:repeating-linear-gradient(90deg,#FF5D6C 0 6px,#E43C4F 6px 12px); }
.expbar-track{ background:#EDE7F7; border-radius:999px; height:8px; overflow:hidden; }
.expbar-fill{ height:100%; background:linear-gradient(90deg,#8B6FF3,#B98FF3); transition:width .3s linear; }

.sprite-box{
  width:88px; height:88px; border-radius:16px; display:flex; align-items:center;
  justify-content:center; font-size:46px; flex:none;
}
.sprite-boss{ width:104px; height:104px; font-size:56px; }

.chip{ font-size:11px; font-weight:800; padding:3px 9px; border-radius:999px; }
.chip-green{ background:#DFF3E7; color:var(--green-dark); }
.chip-gold{ background:#FBEBCF; color:#9A7415; }
.chip-blue{ background:var(--pastel-blue); color:var(--blue-gray-dark); }
.chip-red{ background:#FBE1E1; color:#B23F3F; }

#phone-wrap{ position:relative; z-index:1; display:flex; justify-content:center; padding:28px 12px 140px; }
#phone{
  width:100%; max-width:400px; min-height:760px;
  background:var(--cream); border-radius:36px; border:1px solid rgba(69,63,84,0.08);
  box-shadow:0 20px 45px rgba(69,63,84,0.18);
  position:relative; overflow:hidden; display:flex; flex-direction:column;
}
#phone-notch{ position:absolute; top:0; left:50%; transform:translateX(-50%); width:120px; height:20px; background:var(--ink-soft); opacity:0.5; border-radius:0 0 14px 14px; z-index:5; }
#screen-root{ flex:1; overflow-y:auto; padding:22px 18px 18px; }
.screen-enter{ animation:fadeIn .18s ease; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

.appbar{ display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.appbar .back{ font-size:20px; cursor:pointer; color:var(--ink-soft); }
.appbar h1{ font-size:15px; font-weight:800; margin:0; }

.bottom-nav{ display:flex; border-top:2px solid #EFE6DC; padding:10px 6px 16px; gap:4px; background:var(--cream); }
.bottom-nav button{ flex:1; background:none; border:none; font-size:10px; font-weight:700; color:var(--ink-soft); padding:8px 2px; border-radius:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px;}
.bottom-nav button.active{ color:var(--coral-2); background:#FFF0EC; }
.bottom-nav button span.ic{ font-size:18px; }

.field label{ font-size:12px; font-weight:700; color:var(--ink-soft); display:block; margin-bottom:4px; }
.field input, .field select{
  width:100%; border:2px solid #EFE6DC; border-radius:12px; padding:10px 12px;
  font-family:'Nunito',sans-serif; font-size:16px; background:#fff; color:var(--ink);
}
/* font-size 16px ป้องกัน iOS Safari ซูมอัตโนมัติเมื่อแตะช่องกรอกข้อมูล */
.field input:focus, .field select:focus{ outline:none; border-color:var(--coral-1); }
.field-error{ color:var(--danger); font-size:12px; font-weight:700; margin-top:4px; }

.toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%); background:var(--ink); color:#fff;
  padding:10px 18px; border-radius:999px; font-size:13px; font-weight:700; z-index:100; box-shadow:0 6px 16px rgba(0,0,0,0.25);
  opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease; }
.toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

.holdbar-track{ background:#F3E9E4; border-radius:14px; height:46px; overflow:hidden; position:relative; box-shadow:inset 0 1px 4px rgba(69,63,84,0.15); }
.holdbar-fill{ height:100%; width:0%; background:linear-gradient(90deg,var(--danger),#B23F3F); }
.holdbar-label{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:var(--ink); }

.dev-bar{ position:fixed; top:0; right:0; z-index:50; display:flex; gap:6px; padding:8px; flex-wrap:wrap; max-width:260px; }
.dev-bar button{ font-size:10px; font-weight:700; background:#fff; border:none; box-shadow:0 2px 8px rgba(69,63,84,0.18); border-radius:10px; padding:5px 8px; cursor:pointer; }
.dev-bar .dev-panel{ background:#fff; border:none; box-shadow:0 4px 14px rgba(69,63,84,0.18); border-radius:14px; padding:8px; font-size:11px; display:none; flex-direction:column; gap:6px; width:220px; }
.dev-bar .dev-panel.open{ display:flex; }

.list-row{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:12px 0; border-bottom:1px solid #F1E9E1; }
.list-row:last-child{ border-bottom:none; }

.avatar-locked-banner{ background:#FBE1E1; border:2px dashed var(--danger); border-radius:16px; padding:14px; text-align:center; margin-bottom:14px; }

/* ═════════ มือถือจริง: ถอดกรอบ "โทรศัพท์จำลอง" ออก ให้เต็มจอเหมือนแอปจริง ═════════ */
@media (max-width: 480px){
  #phone-wrap{ padding:0 0 130px; }
  #phone{
    max-width:none; min-height:100vh; border:none; border-radius:0;
    box-shadow:none;
  }
  #phone-notch{ display:none; }
  #bg-scenery{ height:90px; }
  .dev-bar{ max-width:140px; }
  .dev-bar .dev-panel{ width:170px; }
}
</style>
</head>
<body>
<div id="bg-scenery"></div>

<div class="dev-bar">
  <button onclick="toggleDevPanel()">⚙ Dev</button>
  <div class="dev-panel" id="devPanel">
    <strong style="font-size:11px;">โหมดสาธิต (ไม่ใช่ของจริง)</strong>
    <button onclick="resetAllData()">🔄 รีเซ็ตข้อมูลตัวอย่าง</button>
    <button onclick="toggleDemoSpeed()" id="btnDemoSpeed">⏩ เร่งเวลา: ปิด</button>
    <span style="color:#6b6478;">จำลองเวลาผ่านไป (ผลต่อ HP อวตาร):</span>
    <div style="display:flex; gap:4px;">
      <button onclick="simulateTimePass(1)">+1 วัน</button>
      <button onclick="simulateTimePass(2)">+2 วัน</button>
      <button onclick="simulateTimePass(4)">+4 วัน</button>
    </div>
    <button onclick="quickLogin('admin')">🔑 ล็อกอินเป็น Admin</button>
    <button onclick="quickLogin('nan')">🔑 ล็อกอินเป็นสมาชิก (nan)</button>
  </div>
</div>

<div id="phone-wrap">
  <div id="phone">
    <div id="phone-notch"></div>
    <div style="padding:14px 18px 0; display:flex; align-items:center; gap:8px;">
      <div class="logo-badge"></div>
      <span class="pixel-font" style="font-size:11px;">POMO RPG</span>
    </div>
    <div id="screen-root"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════════════
   1. MOCK DATA + PERSISTENCE (localStorage แทนฐานข้อมูลจริง)
   ปรับให้ตรงกับ proposal/usecase/usecase_description.md ฉบับล่าสุด
   (ผ่านรอบตรวจรีวิวที่ 1-11 — ค่าทั้งหมดด้านล่างคือค่ายืนยันสุดท้าย ไม่ใช่ค่าตั้งต้นแล้ว)
   ══════════════════════════════════════════════════════════════════ */
const DB_KEY = 'pomorpg_db_v2';
const UI_KEY = 'pomorpg_ui_v2';

function todayStr(){ return new Date().toISOString().slice(0,10); }

// ── แคตตาล็อกไอเทม: 6 หมวด × 4 ระดับความหายาก (UC-23/UC-24) ──
const RARITIES = ['common','rare','epic','legendary'];
const RARITY_LABEL = { common:'สามัญ', rare:'หายาก', epic:'หายากมาก', legendary:'ตำนาน' };
const RARITY_CHIP  = { common:'chip-blue', rare:'chip-green', epic:'chip-gold', legendary:'chip-red' };
const CATEGORY_DEF = [
  { key:'material', label:'วัตถุดิบผสม',   slot:null,     emoji:{common:'🌿',rare:'💎',epic:'🔮',legendary:'⭐'} },
  { key:'head',     label:'หมวก/หัว',      slot:'head',   emoji:{common:'🧢',rare:'🎩',epic:'👑',legendary:'🪖'} },
  { key:'body',     label:'เกราะ/ลำตัว',   slot:'body',   emoji:{common:'👕',rare:'🥋',epic:'🦺',legendary:'🎽'} },
  { key:'legs',     label:'กางเกง/ขา',     slot:'legs',   emoji:{common:'👖',rare:'🩳',epic:'🥾',legendary:'👢'} },
  { key:'weapon',   label:'อาวุธ',         slot:'weapon', emoji:{common:'🗡️',rare:'⚔️',epic:'🔱',legendary:'🏹'} },
  { key:'shield',   label:'โล่เวลา',       slot:null,     emoji:{common:'🛡️',rare:'🛡️',epic:'🛡️',legendary:'🛡️'} }
];
function buildItemCatalog(){
  let id = 1; const list = [];
  for(const cat of CATEGORY_DEF){
    for(const rarity of RARITIES){
      list.push({ id:id++, category:cat.key, slot:cat.slot, rarity,
        name:`${cat.label} (${RARITY_LABEL[rarity]})`, emoji:cat.emoji[rarity], active:true });
    }
  }
  return list;
}
function itemsByCategoryRarity(category, rarity){ return db.itemCatalog.filter(i=>i.category===category && i.rarity===rarity && i.active); }
function nextRarity(r){ const i = RARITIES.indexOf(r); return (i>=0 && i<RARITIES.length-1) ? RARITIES[i+1] : null; }

// ── ชนิดกล่องสุ่มตามความยาวเซสชัน (UC-10, ยืนยันแล้ว) ──
const BOX_TIERS = ['bronze','silver','gold'];
const BOX_LABEL = { bronze:'กล่องระดับต้น (Bronze)', silver:'กล่องระดับกลาง (Silver)', gold:'กล่องระดับสูง (Gold)' };
const DROP_TABLES_DEFAULT = {
  bronze: { common:85, rare:13, epic:2,  legendary:0 },
  silver: { common:55, rare:30, epic:12, legendary:3 },
  gold:   { common:35, rare:35, epic:22, legendary:8 }
};
// Pity System: การันตีต่อชนิดกล่องเมื่อครบ 10 รอบไม่ได้ของถึงเกณฑ์ (แยกตัวนับต่อชนิดโดยสิ้นเชิง)
const PITY_GUARANTEE = { bronze:'rare', silver:'epic', gold:'legendary' };
function boxTierForDuration(min){
  if(min < 20) return null;       // ต่ำกว่า 20 นาที ไม่ได้กล่องสุ่มเลย
  if(min < 45) return 'bronze';   // 20-44 นาที
  if(min < 90) return 'silver';   // 45-89 นาที
  return 'gold';                  // 90 นาทีขึ้นไป
}

function seedDB(){
  const now = Date.now();
  const day = 24*3600000;
  return {
    users: [
      { id:1, username:'nan', email:'nan@example.com', password:'1234', role:'member' },
      { id:2, username:'ploy', email:'ploy@example.com', password:'1234', role:'member' },
      { id:3, username:'admin', email:'admin@example.com', password:'admin', role:'admin' },
      { id:4, username:'gun', email:'gun@example.com', password:'1234', role:'member' }
    ],
    nextUserId:5,
    avatarSkins: [
      { id:1, name:'นักผจญภัย', emoji:'🧑‍🚀', active:true },
      { id:2, name:'นักปราชญ์', emoji:'🧙‍♂️', active:true },
      { id:3, name:'นินจา', emoji:'🥷', active:true },
      { id:4, name:'อัศวินสาว', emoji:'🦸‍♀️', active:true },
      { id:5, name:'เอลฟ์', emoji:'🧝‍♀️', active:false }
    ],
    // avatar: Max HP = 100 + (level-1)*5 (Level Scaling, ยืนยันแล้ว) — HP เป็น lazy-eval จาก lastFocusCompletedAt + HP Decay 2 หน่วย/ชม.
    // เลเวล N ต้องใช้ N×100 EXP สะสม, streak เพิ่มเฉพาะตอนล็อกอินครั้งแรกของวัน (UC-31) ไม่ใช่ตอนจบเซสชันอีกต่อไป
    avatars: {
      1: { skinId:1, level:5, exp:120, lastFocusCompletedAt: now - 3*3600000, streak:4, lastLoginDate: todayStr(),
           equipped:{head:5, body:null, legs:null, weapon:17}, shieldActiveUntil:null, shieldHpSnapshot:null },
      2: { skinId:4, level:2, exp:40, lastFocusCompletedAt: now - 26*3600000, streak:1, lastLoginDate: todayStr(),
           equipped:{head:null, body:null, legs:null, weapon:null}, shieldActiveUntil:null, shieldHpSnapshot:null }
    },
    focusItems: {
      1: [ {id:1,name:'อ่านหนังสือสอบ'}, {id:2,name:'ทำโปรเจกต์จบ'} ],
      2: [ {id:1,name:'ทบทวนบทเรียน'} ]
    },
    // ระยะเวลาเริ่มต้นของโฟกัส/พัก (UC-37) — ใช้ pre-fill ให้ UC-04 อัตโนมัติ (แก้ไขได้รายเซสชันเสมอ)
    settingsByUser: {
      1: { focusMin:25, breakMin:5 },
      2: { focusMin:25, breakMin:5 }
    },
    itemCatalog: buildItemCatalog(),
    dropTables: JSON.parse(JSON.stringify(DROP_TABLES_DEFAULT)),
    // กล่องสุ่มที่ยังไม่เปิด แยกตามชนิด (UC-23) — เปิดได้จากกระเป๋าเท่านั้นผ่าน UC-10
    boxes: {
      1: { bronze:2, silver:1, gold:0 },
      2: { bronze:1, silver:0, gold:0 }
    },
    inventory: {
      1: [ {itemId:5, qty:1}, {itemId:17, qty:1}, {itemId:1, qty:2}, {itemId:21, qty:1} ],
      2: [ {itemId:1, qty:1} ]
    },
    // ตัวนับ Pity แยกต่างหากตามชนิดกล่องโดยสิ้นเชิง ไม่นับรวม (ยืนยันแล้ว)
    pity: { 1:{bronze:3,silver:0,gold:0}, 2:{bronze:0,silver:0,gold:0} },
    sessionsHistory: {
      1: [
        { id:1, itemName:'อ่านหนังสือสอบ', dateLabel:'6 ก.ค.', ts: now-2*day, focusMin:25, breakMin:5, overrunMin:0, status:'completed', roomId:null },
        { id:2, itemName:'ทำโปรเจกต์จบ', dateLabel:'5 ก.ค.', ts: now-3*day, focusMin:15, breakMin:0, overrunMin:0, status:'cancelled', roomId:null }
      ],
      2: []
    },
    // สูตรผสม (Recipe Table) — ยืนยันแล้ว (UC-12, หมายเหตุข้อ 16)
    craftRecipes: [
      { id:'upgrade', name:'อัพเกรดไอเทมแต่งตัว', kind:'upgrade',
        desc:'ไอเทมแต่งตัวช่องเดียวกัน ระดับเดียวกัน 5 ชิ้น → ระดับถัดไป 1 ชิ้น (ตำนานคือระดับสูงสุด ผสมต่อไม่ได้)' },
      { id:'shield24', name:'ผสมโล่เวลา 24 ชม.', kind:'shield', resultRarity:'rare', hours:24, need:['common','rare'], qty:3,
        desc:'วัตถุดิบผสม ระดับสามัญ/หายาก รวมกัน 3 ชิ้น → โล่เวลา 24 ชม. 1 ชิ้น' },
      { id:'shield48', name:'ผสมโล่เวลา 48 ชม.', kind:'shield', resultRarity:'legendary', hours:48, need:['epic','legendary'], qty:3,
        desc:'วัตถุดิบผสม ระดับหายากมาก/ตำนาน รวมกัน 3 ชิ้น → โล่เวลา 48 ชม. 1 ชิ้น' }
    ],
    rooms: [
      { id:1, code:'FOCUS88', name:'ห้องติวสอบ', goalName:'อ่านหนังสือให้ครบ 10 ชม.', targetMin:600, ownerId:2,
        members:[ {userId:2, focusMin:180, restMin:30, overrunMin:5, joinedAt: now-2*day}, {userId:1, focusMin:90, restMin:15, overrunMin:0, joinedAt: now-day} ],
        bossMaxHp: 600*100*2, kickedUserIds:[], closed:false }
    ],
    // ระบบเพื่อน: friends = เพื่อนแล้ว, outgoing = คำขอที่ส่งไป(รอตอบรับ), incoming = คำขอที่ได้รับ(รอเรา) — UC-21/UC-35
    friends: {
      1: { friends:[2], outgoing:[], incoming:[] },
      2: { friends:[1], outgoing:[], incoming:[] }
    },
    adminStatsSeed: { newMembersRange:[3,4,6,8], sessionCount:142, totalFocusMin:3260, successRate:78, cancelRate:22, unconsciousCount:9, revivedCount:7 }
  };
}

function loadDB(){
  const raw = localStorage.getItem(DB_KEY);
  if(raw) return JSON.parse(raw);
  const seeded = seedDB();
  localStorage.setItem(DB_KEY, JSON.stringify(seeded));
  return seeded;
}
function saveDB(){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }

function loadUI(){

/* ══════════════════════════════════════════════════════════════════
   2. BUSINESS LOGIC (pure computation — ตรงตาม Business Rules ของ usecase_description.md)
   ══════════════════════════════════════════════════════════════════ */
function currentUser(){ return db.users.find(u=>u.id===ui.currentUserId) || null; }
function currentAvatar(){ return db.avatars[ui.currentUserId]; }

// Level Scaling (UC-04, ยืนยันแล้ว): Max HP = 100 ที่เลเวล 1, +5 หน่วยทุกเลเวล
function maxHpForLevel(level){ return 100 + (level-1)*5; }

// HP แบบ lazy evaluation: HP Decay 2 หน่วย/ชม. นับจาก lastFocusCompletedAt (ยืนยันแล้ว แทนสูตรขั้นบันไดเดิม)
function computeAvatarHP(av){
  if(!av) return { hp:0, maxHp:100 };
  const maxHp = maxHpForLevel(av.level);
  if(av.shieldActiveUntil && Date.now() < av.shieldActiveUntil){
    return { hp: (av.shieldHpSnapshot ?? maxHp), maxHp };
  }
  const hrs = Math.max(0, (Date.now() - av.lastFocusCompletedAt) / 3600000);
  const hp = Math.max(0, Math.round(maxHp - hrs*2));
  return { hp, maxHp };
}
function isUnconscious(av){ return computeAvatarHP(av).hp <= 0; }

// เลเวล N ต้องใช้ N × 100 EXP สะสม (ยืนยันแล้ว)
function levelThreshold(level){ return level*100; }
function grantEXP(av, amount){
  av.exp += amount;
  while(av.exp >= levelThreshold(av.level)){
    av.exp -= levelThreshold(av.level);
    av.level += 1;
  }
}
// EXP = นาทีที่โฟกัสสำเร็จ × 2 ต่อเซสชัน (เฉพาะเซสชันที่จบสำเร็จ ≥ 20 นาที — ยืนยันจาก activity diagram UC-04
// ที่แสดง "แจก EXP และกล่องสุ่ม" อยู่ในกิ่ง "≥20 นาที" เดียวกัน; ยกเลิกกลางทางหรือสั้นกว่า 20 นาทีไม่ได้ EXP เลย)
function expForDuration(min){ return min < 20 ? 0 : Math.round(min*2); }

function grantBox(userId, tier){
  if(!tier) return;
  db.boxes[userId] = db.boxes[userId] || {bronze:0,silver:0,gold:0};
  db.boxes[userId][tier] += 1;
}
// เปิดกล่องสุ่ม + Pity System แยกตามชนิดกล่องโดยสิ้นเชิง (UC-10, ยืนยันแล้ว)
function rollLootItem(userId, tier){
  const table = db.dropTables[tier];
  db.pity[userId] = db.pity[userId] || {bronze:0,silver:0,gold:0};
  const pity = db.pity[userId];
  let rarity;
  if(pity[tier] >= 10){
    rarity = PITY_GUARANTEE[tier]; // การันตี
  } else {
    const roll = Math.random()*100; let acc = 0; rarity = 'common';
    for(const r of RARITIES){ acc += table[r]; if(roll <= acc){ rarity = r; break; } }
  }
  const guaranteeIdx = RARITIES.indexOf(PITY_GUARANTEE[tier]);
  if(RARITIES.indexOf(rarity) >= guaranteeIdx){ pity[tier] = 0; } else { pity[tier] += 1; }
  const candidates = db.itemCatalog.filter(i=>i.active && i.rarity===rarity);
  const picked = candidates[Math.floor(Math.random()*candidates.length)] || db.itemCatalog[0];
  addToInventory(userId, picked.id, 1);
  db.boxes[userId][tier] = Math.max(0, (db.boxes[userId][tier]||0) - 1);
  saveDB();
  return { picked, pity: pity[tier] };
}
function addToInventory(userId, itemId, qty){
  const inv = db.inventory[userId] || (db.inventory[userId]=[]);
  const row = inv.find(r=>r.itemId===itemId);
  if(row) row.qty += qty; else inv.push({itemId, qty});
}
function removeFromInventory(userId, itemId, qty){
  const inv = db.inventory[userId] || [];
  const row = inv.find(r=>r.itemId===itemId);
  if(row){ row.qty -= qty; if(row.qty<=0) db.inventory[userId]=inv.filter(r=>r!==row); }
}
function invQty(userId, itemId){ const row=(db.inventory[userId]||[]).find(r=>r.itemId===itemId); return row?row.qty:0; }
function itemById(id){ return db.itemCatalog.find(i=>i.id===id); }

// ── Auth/Streak (UC-31) ──
function applyLoginStreak(userId){
  const av = db.avatars[userId];
  if(!av) return;
  const t = todayStr();
  if(av.lastLoginDate !== t){ av.streak += 1; av.lastLoginDate = t; saveDB(); }
}
function performLogin(u){
  ui.currentUserId = u.id; saveUI();
  if(u.role==='admin'){ nav('adminDash'); return; }
  if(db.avatars[u.id]) applyLoginStreak(u.id);
  if(!db.avatars[u.id]){ nav('createAvatar'); return; }
  nav(isUnconscious(db.avatars[u.id]) ? 'revival' : 'home');
}

function hpBarHTML(hp, maxHp){
  const pct = maxHp>0 ? Math.max(0, Math.min(100, hp/maxHp*100)) : 0;
  const cls = pct<=20?'critical':(pct<=50?'low':'');
  return `<div class="hpbar-track"><div class="hpbar-fill ${cls}" style="width:${pct}%"></div></div>`;
}

function submitRegister(){
  const email = document.getElementById('regEmail').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  let err = '';
  if(!email || !username || !password) err = 'กรุณากรอกข้อมูลให้ครบทุกช่อง';
  else if(password.length < 4) err = 'รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร';
  else if(db.users.some(u=>u.email===email || u.username===username)) err = 'อีเมลหรือชื่อผู้ใช้นี้ถูกใช้แล้ว';
  if(err){ document.getElementById('regError').innerHTML = fieldError(err); return; }
  const newUser = { id: db.nextUserId++, username, email, password, role:'member' };
  db.users.push(newUser);
  db.avatars[newUser.id] = null; // ยังไม่มีอวตาร จนกว่าจะทำ UC-02
  db.focusItems[newUser.id] = [];
  db.settingsByUser[newUser.id] = { focusMin:25, breakMin:5 };
  db.inventory[newUser.id] = [];
  db.boxes[newUser.id] = { bronze:0, silver:0, gold:0 };
  db.pity[newUser.id] = { bronze:0, silver:0, gold:0 };
  db.sessionsHistory[newUser.id] = [];
  db.friends[newUser.id] = { friends:[], outgoing:[], incoming:[] };
  saveDB();
  ui.currentUserId = newUser.id; saveUI();
  showToast('สมัครสมาชิกสำเร็จ! เลือกอวตารของคุณ');
  nav('createAvatar');
}

  const idVal = document.getElementById('forgotId').value.trim();
  ui._forgotTarget = idVal;
  ui._forgotStep = 2; saveUI();
  showToast('หากอีเมลนี้มีอยู่ในระบบ จะได้รับลิงก์รีเซ็ตรหัสผ่าน (จำลอง: ไปขั้นตอนถัดไปได้เลย)');
  render();

function submitForgotReset(){
  const pw1 = document.getElementById('forgotPw1').value;
  const pw2 = document.getElementById('forgotPw2').value;
  if(!pw1 || pw1.length<4){ document.getElementById('forgotErr').innerHTML = fieldError('รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร'); return; }
  if(pw1 !== pw2){ document.getElementById('forgotErr').innerHTML = fieldError('รหัสผ่านใหม่ไม่ตรงกับช่องยืนยัน'); return; }
  const idVal = (ui._forgotTarget||'').toLowerCase();
  const u = db.users.find(x=>x.username.toLowerCase()===idVal || x.email.toLowerCase()===idVal);
  if(u){ u.password = pw1; saveDB(); }
  ui._forgotStep = 1; ui._forgotTarget = null; saveUI();
  showToast('ตั้งรหัสผ่านใหม่สำเร็จ — เข้าสู่ระบบด้วยรหัสผ่านใหม่ได้เลย');

// UC-24: สวมใส่/ถอดไอเทมแต่งตัวอวตาร (4 ช่อง: หัว/ลำตัว/ขา/อาวุธ)
// ตาม activity diagram: "สวมใส่" เลือกได้หลายช่องก่อน (draft + preview) แล้วกด "ยืนยัน" ครั้งเดียวจึงบันทึกจริง
// ส่วน "ถอด" มีผลทันทีไม่ต้องกดยืนยันซ้ำ — คนละ branch กัน
const SLOT_LABELS = { head:'หัว', body:'ลำตัว', legs:'ขา', weapon:'อาวุธ' };
function renderAvatarEquip(){
  const av = currentAvatar();
  const skin = db.avatarSkins.find(s=>s.id===av.skinId);
  const inv = db.inventory[ui.currentUserId] || [];
  const slots = ['head','body','legs','weapon'];
  const draft = ui._equipDraft || {};
  let hasDraft = false;
  const html = slots.map(slot=>{
    const equippedId = av.equipped[slot];
    const equippedItem = equippedId ? itemById(equippedId) : null;
    const draftId = draft[slot];
    const draftItem = draftId ? itemById(draftId) : null;
    if(draftItem) hasDraft = true;
    const previewItem = draftItem || equippedItem;
    const options = inv.filter(r=>{ const it=itemById(r.itemId); return it && it.slot===slot && r.qty>0; });
    return `
    <div class="card" style="margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-weight:800; font-size:12px;">ช่อง${SLOT_LABELS[slot]}${draftItem?' <span class="chip chip-gold">เลือกไว้ (ยังไม่ยืนยัน)</span>':''}</div>
        ${equippedItem && !draftItem? `<button class="btn btn-danger" style="padding:5px 10px;" onclick="unequipSlot('${slot}')">ถอด</button>` : ''}
      </div>
      <div style="height:8px;"></div>
      ${previewItem
        ? `<div class="list-row"><span>${previewItem.emoji} ${previewItem.name}</span><span class="chip ${RARITY_CHIP[previewItem.rarity]}">${RARITY_LABEL[previewItem.rarity]}</span></div>`
        : ''}
      ${options.length===0 && !previewItem? `<p style="font-size:11px; color:var(--ink-soft);">ไม่มีไอเทมที่ใส่ช่องนี้ได้ในกระเป๋า</p>` : ''}
      ${options.length>0 ? `<div style="height:6px;"></div><div style="font-size:11px; color:var(--ink-soft); margin-bottom:4px;">เลือกไอเทมสำหรับช่องนี้:</div>
      ${options.map(r=>{ const it=itemById(r.itemId); const picked = draftId===it.id; return `
        <div class="list-row"><span>${it.emoji} ${it.name} (x${r.qty})</span><button class="btn ${picked?'btn-success':'btn-secondary'}" style="padding:5px 10px;" onclick="pickEquipDraft('${slot}', ${it.id})">${picked?'เลือกไว้ ✓':'เลือก'}</button></div>`;}).join('')}` : ''}

  }).join('');
  return `

  </div>

}
function pickEquipDraft(slot, itemId){
  ui._equipDraft = ui._equipDraft || {};
  ui._equipDraft[slot] = (ui._equipDraft[slot]===itemId) ? null : itemId; // แตะซ้ำ = ยกเลิกที่เลือกไว้

}
function confirmEquip(){
  const av = currentAvatar();
  const draft = ui._equipDraft || {};
  for(const slot in draft){
    if(draft[slot]) av.equipped[slot] = draft[slot];

/* ══════════════════════════════════════════════════════════════════
   6. SCREENS — วงจรเซสชันโฟกัส (UC-04 ตีบอส / ยกเลิกกลางทาง / Summary / พัก+เบรกเกิน)
   ══════════════════════════════════════════════════════════════════ */
let sessionTicker=null, breakTicker=null, holdTimer=null;
function stopAllTimers(){ clearInterval(sessionTicker); clearInterval(breakTicker); clearTimeout(holdTimer); }

function startSession(isRevival){
  const itemSel = document.getElementById('sessionItem');
  const minInput = document.getElementById('sessionMin');
  const itemId = itemSel? parseInt(itemSel.value) : 0;
  const minutes = isRevival ? 20 : (parseInt(minInput.value)||25); // UC-30: ภารกิจชุบชีวิตคงที่ 20 นาที
  const item = isRevival? {name:'ภารกิจชุบชีวิต'} : db.focusItems[ui.currentUserId].find(i=>i.id===itemId);
  ui.session = {
    itemName: item.name, durationMin: minutes, startedAt: Date.now(),
    isRevival: !!isRevival, roomId: ui.tempRoomId || null
  };
  saveUI();
  nav('session');
}
function bossElapsedMin(){
  const speed = ui.demoSpeed ? 60 : 1; // โหมดสาธิต: 1 นาทีจริง = 1 วินาที
  return (Date.now() - ui.session.startedAt) / 60000 * speed;
}
function renderSession(){
  const s = ui.session;
  const elapsed = Math.min(bossElapsedMin(), s.durationMin);
  const bossHpPct = Math.max(0, 100 - (elapsed/s.durationMin*100));
  const remainMin = Math.max(0, s.durationMin - elapsed);
  const mm = String(Math.floor(remainMin)).padStart(2,'0');
  const ss = String(Math.floor((remainMin%1)*60)).padStart(2,'0');
  setTimeout(()=>{
    clearInterval(sessionTicker);
    sessionTicker = setInterval(tickSession, 250);
  },0);
  return `
  <div style="text-align:center;">
    <div style="font-size:12px; color:var(--ink-soft); margin-bottom:6px;">${s.isRevival?'ภารกิจชุบชีวิต':'กำลังโฟกัส'}: ${s.itemName}</div>
    <div class="sprite-box sprite-boss pixel-border" style="margin:0 auto; background:var(--pastel-blue);">👹</div>
    <div style="height:10px;"></div>
    <div style="font-size:11px; color:var(--ink-soft);">Boss HP</div>
    ${hpBarHTML(Math.round(bossHpPct), 100)}
    <div style="height:18px;"></div>
    <div class="pixel-font" id="sessionClock" style="font-size:30px;">${mm}:${ss}</div>
    <div style="height:22px;"></div>
    <div class="holdbar-track" id="holdBar"
      onmousedown="startHoldCancel()" onmouseup="cancelHold()" onmouseleave="cancelHold()"
      ontouchstart="startHoldCancel()" ontouchend="cancelHold()">
      <div class="holdbar-fill" id="holdFill"></div>
      <div class="holdbar-label">กดค้าง 2 วิ เพื่อยกเลิกเซสชัน</div>
    </div>
  </div>`;
}
function tickSession(){
  const s = ui.session; if(!s) return;
  const elapsed = bossElapsedMin();
  if(elapsed >= s.durationMin){ clearInterval(sessionTicker); completeSession(); return; }
  const bossHpPct = Math.max(0, 100 - (elapsed/s.durationMin*100));
  const remainMin = Math.max(0, s.durationMin - elapsed);
  const mm = String(Math.floor(remainMin)).padStart(2,'0');
  const ss = String(Math.floor((remainMin%1)*60)).padStart(2,'0');
  const clockEl = document.getElementById('sessionClock');
  if(clockEl) clockEl.textContent = mm+':'+ss;
  const fillEl = document.querySelector('#screen-root .hpbar-fill');
  if(fillEl){ fillEl.style.width = bossHpPct+'%'; fillEl.className='hpbar-fill '+(bossHpPct<=20?'critical':(bossHpPct<=50?'low':'')); }
}
function startHoldCancel(){
  const fill = document.getElementById('holdFill');
  fill.style.transition = 'width 2s linear';
  requestAnimationFrame(()=>{ fill.style.width='100%'; });
  holdTimer = setTimeout(()=>{ cancelSessionMidway(); }, 2000);
}
function cancelHold(){
  clearTimeout(holdTimer);
  const fill = document.getElementById('holdFill');
  if(!fill) return;
  fill.style.transition = 'width .15s ease';
  fill.style.width='0%';
}
function cancelSessionMidway(){
  clearInterval(sessionTicker);
  const s = ui.session;
  const elapsed = Math.min(bossElapsedMin(), s.durationMin);
  const ratio = s.durationMin>0 ? elapsed / s.durationMin : 0;
  const av = currentAvatar();
  if(!s.isRevival){
    // ยกเลิกกลางทาง: ไม่ได้ EXP เลย (เฉพาะเซสชันที่จบสำเร็จเท่านั้นถึงได้ EXP) แต่คืน HP ตามสัดส่วนเวลาที่โฟกัสจริง
    const { hp: hpBefore, maxHp } = computeAvatarHP(av);
    const hpAfter = Math.min(maxHp, Math.round(hpBefore + (maxHp - hpBefore) * ratio));
    const hoursForThatHp = (maxHp - hpAfter) / 2; // ย้อนเวลาให้ตรงกับ HP Decay 2 หน่วย/ชม.
    av.lastFocusCompletedAt = Date.now() - hoursForThatHp*3600000;
    db.sessionsHistory[ui.currentUserId] = db.sessionsHistory[ui.currentUserId] || [];
    db.sessionsHistory[ui.currentUserId].unshift({ id:Date.now(), itemName:s.itemName, dateLabel:'วันนี้', ts:Date.now(), focusMin:Math.round(elapsed), breakMin:0, overrunMin:0, status:'cancelled', roomId:s.roomId });
    saveDB();
  }
  ui.session = null; saveUI();
  showToast('ยกเลิกเซสชัน — ไม่ได้ EXP (ยกเลิกกลางทาง) แต่ HP คืนตามสัดส่วนเวลาที่โฟกัสจริง ('+Math.round(elapsed)+' นาที)');
  nav(s.isRevival ? 'revival' : 'home');
}
function completeSession(){
  const s = ui.session;
  const av = currentAvatar();
  if(s.isRevival){
    // UC-30: ลดเลเวลลง 2 ระดับ (ต่ำสุดเลเวล 1) รีเซ็ต EXP เป็น 0 ปรับ Max HP ตาม Level Scaling แล้วคืน HP เต็มเท่ากับ Max HP ใหม่
    av.level = Math.max(1, av.level - 2);
    av.exp = 0;
    av.lastFocusCompletedAt = Date.now();
    saveDB();
    db.sessionsHistory[ui.currentUserId].unshift({ id:Date.now(), itemName:'ภารกิจชุบชีวิต', dateLabel:'วันนี้', ts:Date.now(), focusMin:s.durationMin, breakMin:0, overrunMin:0, status:'completed', roomId:null });
    saveDB();
    ui.session=null; saveUI();
    showToast('ชุบชีวิตสำเร็จ! เลเวลลดลง 2 ระดับ (Lv.'+av.level+') HP เต็มเท่ากับ Max HP ใหม่');
    nav('home');
    return;
  }
  const exp = expForDuration(s.durationMin);
  const tier = boxTierForDuration(s.durationMin);
  grantEXP(av, exp);
  av.lastFocusCompletedAt = Date.now(); // คืน HP เต็มเท่ากับ Max HP ปัจจุบันเมื่อจบสำเร็จ (lazy-eval: ตอนนี้ = HP เต็ม)
  saveDB();
  if(tier) grantBox(ui.currentUserId, tier);
  if(s.roomId){
    const room = db.rooms.find(r=>r.id===s.roomId);
    if(room){ const m = room.members.find(m=>m.userId===ui.currentUserId); if(m) m.focusMin += s.durationMin; saveDB(); }
  }
  db.sessionsHistory[ui.currentUserId].unshift({ id:Date.now(), itemName:s.itemName, dateLabel:'วันนี้', ts:Date.now(), focusMin:s.durationMin, breakMin:db.settingsByUser[ui.currentUserId].breakMin, overrunMin:0, status:'completed', roomId:s.roomId });
  saveDB();
  ui._lastReward = { exp, tier };
  ui._lastHistoryId = db.sessionsHistory[ui.currentUserId][0].id;
  ui.session = null;
  ui.breakState = { startedAt: Date.now(), durationMin: db.settingsByUser[ui.currentUserId].breakMin, overrunNotified:false, roomId: s.roomId };
  saveUI();
  nav('summary');
}
// เก็บสถิติ Rest/Over-rest ของสมาชิกในห้อง (UC-20 ต้องแสดง 3 คอลัมน์: Focus/Rest/Over-rest)
function creditRoomStats(roomId, userId, restMin, overrunMin){
  if(!roomId) return;
  const room = db.rooms.find(r=>r.id===roomId);
  if(!room) return;
  const m = room.members.find(m=>m.userId===userId);
  if(!m) return;
  m.restMin = (m.restMin||0) + Math.max(0, Math.round(restMin));
  m.overrunMin = (m.overrunMin||0) + Math.max(0, Math.round(overrunMin));
  saveDB();
}

function renderSummary(){
  const r = ui._lastReward || {exp:0, tier:null};
  return `
  <div style="text-align:center; padding-top:20px;">
    <div style="font-size:54px;">🏆</div>

function renderBreak(){
  const b = ui.breakState;
  const speed = ui.demoSpeed ? 60 : 1;
  const elapsedMin = (Date.now()-b.startedAt)/60000*speed;
  const remain = b.durationMin - elapsedMin;
  setTimeout(()=>{ clearInterval(breakTicker); breakTicker = setInterval(tickBreak, 250); },0);
  if(remain > 0){
    return `
    <div style="text-align:center; padding-top:30px;">
      <div style="font-size:50px;">☕</div>
      <h1 class="pixel-font" style="font-size:14px; margin:14px 0;">ช่วงพัก</h1>
      <div class="pixel-font" id="breakClock" style="font-size:26px;">${fmtMin(remain)}</div>
      <div style="height:20px;"></div>
      <button class="btn btn-secondary btn-block" onclick="endBreakEarly()">เสร็จสิ้นช่วงพัก (จบก่อนเวลา)</button>
    </div>`;
  }
  const overrun = elapsedMin - b.durationMin;
  return `
  <div style="text-align:center; padding-top:30px;">
    <div style="font-size:50px;">⏰</div>
    <h1 class="pixel-font" style="font-size:14px; margin:14px 0;">พักเกินเวลาแล้ว</h1>
    <div class="pixel-font" id="breakClock" style="font-size:26px; color:var(--danger);">+${fmtMin(overrun)}</div>
    <p style="font-size:11px; color:var(--ink-soft); margin-top:8px;">ระบบนับเวลาพักเกินไว้เป็นสถิติ (Over-rest) จนกว่าจะเริ่มเซสชันถัดไป</p>
    <div style="height:20px;"></div>
    <button class="btn btn-primary btn-block" onclick="endBreakOverrun()">ไปเริ่มเซสชันถัดไป</button>
  </div>`;
}
function fmtMin(min){ const m=Math.floor(Math.max(0,min)), s=Math.floor((Math.max(0,min)%1)*60); return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
function tickBreak(){
  const b = ui.breakState; if(!b) return;
  const speed = ui.demoSpeed?60:1;
  const elapsedMin = (Date.now()-b.startedAt)/60000*speed;
  const remain = b.durationMin - elapsedMin;
  const el = document.getElementById('breakClock');
  if(remain<=0){
    if(!b.overrunNotified){
      b.overrunNotified = true; saveUI();
      showToast('พักครบเวลาแล้ว! เริ่มนับเวลาพักเกินเป็นสถิติจนกว่าจะเริ่มเซสชันถัดไป (แจ้งเตือนแม้แอปอยู่ background — จำลอง)');
      render();
      return;
    }
    if(el) el.textContent = '+' + fmtMin(elapsedMin - b.durationMin);
    return;
  }
  if(el) el.textContent = fmtMin(remain);
}
function endBreakEarly(){
  clearInterval(breakTicker);
  const b = ui.breakState;
  const speed = ui.demoSpeed?60:1;
  const elapsedMin = Math.min(b.durationMin, (Date.now()-b.startedAt)/60000*speed);
  if(b.roomId) creditRoomStats(b.roomId, ui.currentUserId, elapsedMin, 0);
  const backTo = b.roomId ? 'roomView' : 'home';
  ui.breakState = null; saveUI();
  showToast('จบช่วงพักทันที ไม่มีการนับเบรกเกิน');
  nav(backTo);
}
function endBreakOverrun(){
  clearInterval(breakTicker);
  const b = ui.breakState;
  const speed = ui.demoSpeed?60:1;
  const elapsedMin = (Date.now()-b.startedAt)/60000*speed;
  const overrun = Math.max(0, Math.round(elapsedMin - b.durationMin));
  if(ui._lastHistoryId){
    const row = (db.sessionsHistory[ui.currentUserId]||[]).find(r=>r.id===ui._lastHistoryId);
    if(row){ row.overrunMin = overrun; saveDB(); }
  }
  if(b.roomId) creditRoomStats(b.roomId, ui.currentUserId, b.durationMin, overrun);
  const backTo = b.roomId ? 'roomView' : 'home';
  ui.breakState = null; ui._lastHistoryId = null; saveUI();
  showToast('บันทึกเวลาพักเกิน '+overrun+' นาทีแล้ว — เริ่มเซสชันใหม่ได้เลย');
  nav(backTo);
}

}
function selectCraftRecipe(id){ ui._craftRecipe = id; ui._craftSlotRarity = null; render(); }
function renderCraftRecipeDetail(recipe){
  const uid = ui.currentUserId;
  if(recipe.kind === 'upgrade'){
    const slots = ['head','body','legs','weapon'];
    const options = [];
    for(const slot of slots){
      for(const rarity of ['common','rare','epic']){
        const it = itemsByCategoryRarity(slot, rarity)[0];
        if(it && invQty(uid, it.id) >= 5) options.push({slot, rarity, item:it});
      }
    }
    const pickedKey = ui._craftSlotRarity;
    const picked = options.find(o=>`${o.slot}-${o.rarity}`===pickedKey);
    return `
    <div class="card">
      <div style="font-weight:800; font-size:12px; margin-bottom:8px;">เลือกไอเทมต้นทาง (ต้องมี 5 ชิ้นระดับเดียวกัน ช่องเดียวกัน)</div>
      ${options.length===0? `<p style="font-size:12px; color:var(--ink-soft);">ยังไม่มีไอเทมชุดใดครบ 5 ชิ้น</p>` :
      options.map(o=>`
        <div class="list-row" style="cursor:pointer;" onclick="pickCraftSlotRarity('${o.slot}','${o.rarity}')">
          <span>${o.item.emoji} ${o.item.name} (${invQty(uid,o.item.id)} ชิ้น)</span>
          <span>${pickedKey===(o.slot+'-'+o.rarity)?'✓':'›'}</span>
        </div>`).join('')}
      ${picked? `
      <div style="height:14px;"></div>
      <button class="btn btn-primary btn-block" onclick="doCraftUpgrade('${picked.slot}','${picked.rarity}')">ยืนยันการผสม → ${itemsByCategoryRarity(picked.slot, nextRarity(picked.rarity))[0].name}</button>` : ''}
    </div>`;
  }
  // สูตรผสมโล่เวลา
  const haveA = itemsByCategoryRarity('material', recipe.need[0]).reduce((a,i)=>a+invQty(uid,i.id),0);
  const haveB = itemsByCategoryRarity('material', recipe.need[1]).reduce((a,i)=>a+invQty(uid,i.id),0);
  const have = haveA + haveB;
  const ok = have >= recipe.qty;
  return `
  <div class="card" style="text-align:center;">
    <div style="font-weight:800; font-size:12px; margin-bottom:8px;">วัตถุดิบผสมระดับ${RARITY_LABEL[recipe.need[0]]}/${RARITY_LABEL[recipe.need[1]]}: ${have}/${recipe.qty}</div>
    <div style="font-size:34px;">🌿💎 ➜ 🛡️</div>
    <div style="height:14px;"></div>
    <button class="btn btn-primary btn-block" ${ok?'':'disabled'} onclick="doCraftShield('${recipe.id}')">${ok?'ยืนยันการผสม':'วัตถุดิบไม่ครบ'}</button>
  </div>`;
}
function pickCraftSlotRarity(slot, rarity){ ui._craftSlotRarity = slot+'-'+rarity; render(); }
function doCraftUpgrade(slot, rarity){
  const uid = ui.currentUserId;
  const srcItem = itemsByCategoryRarity(slot, rarity)[0];
  const nr = nextRarity(rarity);
  if(!nr){ showToast('ระดับตำนานคือระดับสูงสุดแล้ว ผสมต่อไม่ได้'); return; }
  if(invQty(uid, srcItem.id) < 5){ showToast('ไอเทมไม่ครบ 5 ชิ้น'); return; }
  const resultItem = itemsByCategoryRarity(slot, nr)[0];
  removeFromInventory(uid, srcItem.id, 5);
  addToInventory(uid, resultItem.id, 1);
  saveDB();
  ui._craftSlotRarity = null; ui._craftRecipe = null;
  showToast('อัพเกรดสำเร็จ! ได้รับ ' + resultItem.name);
  nav('inventory');
}
function doCraftShield(recipeId){
  const recipe = db.craftRecipes.find(r=>r.id===recipeId);
  const uid = ui.currentUserId;
  let remaining = recipe.qty;
  for(const rarity of recipe.need){
    const mats = itemsByCategoryRarity('material', rarity);
    for(const m of mats){
      if(remaining<=0) break;
      const have = invQty(uid, m.id);
      const take = Math.min(have, remaining);
      if(take>0){ removeFromInventory(uid, m.id, take); remaining -= take; }
    }
  }
  if(remaining>0){ showToast('วัตถุดิบไม่ครบ'); return; }
  const shieldItem = db.itemCatalog.find(i=>i.category==='shield' && i.rarity===recipe.resultRarity);
  addToInventory(uid, shieldItem.id, 1);
  saveDB();
  ui._craftRecipe = null;
  showToast(`ผสมสำเร็จ! ได้รับ ${shieldItem.name} (${recipe.hours} ชม.)`);
  nav('inventory');
}

    <div class="field"><label>ชื่อห้อง</label><input id="roomName" type="text" placeholder="เช่น ห้องติวสอบ Final"></div>
    <div style="height:10px;"></div>
    <div class="field"><label>ชื่อเป้าหมาย</label><input id="roomGoal" type="text" placeholder="เช่น อ่านหนังสือให้ครบ 10 ชม."></div>
    <div style="height:10px;"></div>
    <div class="field"><label>เป้าหมายเวลารวม (นาที) — เว้นว่างใช้ค่าเริ่มต้น 300</label><input id="roomTarget" type="number" placeholder="300"></div>
    <div style="height:14px;"></div>
    <button class="btn btn-primary btn-block" onclick="submitCreateRoom()">สร้างห้อง</button>
  </div>`;
}
function submitCreateRoom(){
  const name = document.getElementById('roomName').value.trim() || 'ห้องโฟกัส';
  const goal = document.getElementById('roomGoal').value.trim() || 'โฟกัสร่วมกัน';
  const target = parseInt(document.getElementById('roomTarget').value) || 300;
  const code = 'ROOM' + Math.floor(1000+Math.random()*9000);
  const newRoom = { id: Date.now(), code, name, goalName:goal, targetMin:target, ownerId:ui.currentUserId,
    members:[{userId:ui.currentUserId, focusMin:0, restMin:0, overrunMin:0, joinedAt:Date.now()}],
    bossMaxHp: target*100*1, kickedUserIds:[], closed:false };
  db.rooms.push(newRoom);
  saveDB();
  ui.tempRoomId = newRoom.id; saveUI();
  showToast('สร้างห้องสำเร็จ! รหัสเชิญ: ' + code);
  nav('roomView');
}

function renderJoinRoom(){
  return `
  ${appbar('เข้าร่วมห้องโฟกัส','roomList')}
  <div class="card">
    <div class="field"><label>รหัสเชิญ</label><input id="joinCode" type="text" placeholder="เช่น FOCUS88"></div>
    <div id="joinErr"></div>
    <div style="height:14px;"></div>
    <button class="btn btn-primary btn-block" onclick="submitJoinRoom()">เข้าร่วม</button>
  </div>`;
}
function submitJoinRoom(){
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  const room = db.rooms.find(r=>r.code===code);
  if(!room){ document.getElementById('joinErr').innerHTML = fieldError('รหัสไม่ถูกต้องหรือหมดอายุ'); return; }
  if(room.closed){ document.getElementById('joinErr').innerHTML = fieldError('ห้องนี้ปิดรับสมัครแล้ว'); return; }
  if((room.kickedUserIds||[]).includes(ui.currentUserId)){ document.getElementById('joinErr').innerHTML = fieldError('คุณถูกเตะออกจากห้องนี้ ไม่สามารถเข้าร่วมซ้ำด้วยรหัสเดิมได้'); return; }
  const already = room.members.some(m=>m.userId===ui.currentUserId);
  if(!already && room.members.length >= 8){ document.getElementById('joinErr').innerHTML = fieldError('ห้องนี้มีสมาชิกครบ 8 คนแล้ว'); return; }
  if(!already){
    room.members.push({userId:ui.currentUserId, focusMin:0, restMin:0, overrunMin:0, joinedAt:Date.now()});
    // HP บอสกลุ่มปรับเพิ่มขึ้นเมื่อมีสมาชิกเข้าร่วมเพิ่มเท่านั้น (ไม่ลดย้อนหลังเมื่อมีคนออก/ถูกเตะ)
    const newMax = room.targetMin*100*room.members.length;
    if(newMax > room.bossMaxHp) room.bossMaxHp = newMax;
  }
  saveDB();
  ui.tempRoomId = room.id; saveUI();
  showToast('เข้าร่วมห้องสำเร็จ!');
  nav('roomView');
}

function renderRoomView(){
  const room = db.rooms.find(r=>r.id===ui.tempRoomId);
  const totalMin = room.members.reduce((a,m)=>a+m.focusMin,0);
  const bossMaxHp = room.bossMaxHp || (room.targetMin*100*room.members.length);
  const bossHp = Math.max(0, bossMaxHp - totalMin*100);
  // UC-18: เป้าหมายห้องสำเร็จอัตโนมัติเมื่อ HP บอสกลุ่ม = 0 (ไม่ต้องรอเจ้าของห้องกดปิดเอง)
  if(bossHp<=0 && !room.closed){
    autoCloseRoomGoal(room);
    return '';
  }
  const isOwner = room.ownerId === ui.currentUserId;
  const pct = Math.min(100, Math.round(totalMin/room.targetMin*100));
  const sorted = [...room.members].sort((a,b)=>b.focusMin-a.focusMin);
  return `
  ${appbar(room.name,'roomList')}
  <div class="card">
    <div style="font-size:12px; color:var(--ink-soft);">เป้าหมาย: ${room.goalName}</div>
    <div style="font-size:11px; margin:6px 0;">HP บอสกลุ่ม ${bossHp}/${bossMaxHp} (สมาชิก ${room.members.length}/8 คน)</div>
    ${hpBarHTML(bossHp, bossMaxHp)}
    <div style="height:8px;"></div>
    <div style="font-size:11px;">${totalMin}/${room.targetMin} นาทีรวม (${pct}%)</div>
    <div class="expbar-track" style="height:8px;"><div class="expbar-fill" style="width:${pct}%"></div></div>
    <div style="height:6px;"></div>
    <div style="font-size:11px; color:var(--ink-soft);">รหัสเชิญ: <b>${room.code}</b></div>
  </div>
  <div style="height:14px;"></div>
  <div class="card">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">อันดับสมาชิกในห้อง (Focus / Rest / Over-rest)</div>
    ${sorted.map((m,idx)=>{ const u=db.users.find(x=>x.id===m.userId); return `
      <div class="list-row" style="flex-wrap:wrap;">
        <span>${idx+1}. ${u.username} ${m.userId===room.ownerId?'👑':''}</span>
        <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
          <span class="chip chip-blue">🎯${m.focusMin}</span>
          <span class="chip chip-green">☕${m.restMin||0}</span>
          <span class="chip chip-red">⏰${m.overrunMin||0}</span>
          ${(isOwner && m.userId!==ui.currentUserId && !room.closed) ? `<button class="btn btn-danger" style="padding:4px 8px;" onclick="kickMember(${room.id}, ${m.userId})">เตะ</button>` : ''}
        </div>
      </div>`;}).join('')}
  </div>
  <div style="height:14px;"></div>
  ${room.closed? `<p style="text-align:center; font-size:12px; color:var(--ink-soft);">ห้องนี้ปิดแล้ว</p>` : `
  <button class="btn btn-primary btn-block" onclick="startSessionInRoom()">⚔️ เริ่มโฟกัสในห้องนี้</button>
  <div style="height:10px;"></div>
  ${isOwner
    ? `<button class="btn btn-success btn-block" onclick="closeRoomGoal(${room.id})">🏁 สำเร็จเป้าหมาย (ปิดห้อง)</button><div style="height:10px;"></div><button class="btn btn-ghost btn-block" onclick="leaveRoom(${room.id})">ออกจากห้อง (โอนสิทธิ์เจ้าของ)</button>`
    : `<button class="btn btn-danger btn-block" onclick="leaveRoom(${room.id})">ออกจากห้อง</button>`}
  `}`;
}
function autoCloseRoomGoal(room){
  room.closed = true;
  room.members.forEach(m=>{
    db.sessionsHistory[m.userId] = db.sessionsHistory[m.userId] || [];
    db.sessionsHistory[m.userId].unshift({ id:Date.now()+m.userId, itemName:'สรุปห้อง: '+room.name, dateLabel:'วันนี้', ts:Date.now(), focusMin:m.focusMin, breakMin:m.restMin||0, overrunMin:m.overrunMin||0, status:'completed', roomId:room.id });
  });
  saveDB();
  showToast('บรรลุเป้าหมายห้องสำเร็จ! (HP บอสกลุ่มเหลือ 0)');
  nav('roomSummary');
}
function startSessionInRoom(){
  const items = db.focusItems[ui.currentUserId];
  if(items.length===0){ showToast('เพิ่มรายการที่จะโฟกัสก่อน'); nav('focusList'); return; }
  const room = db.rooms.find(r=>r.id===ui.tempRoomId);
  ui.session = { itemName: items[0].name, durationMin: db.settingsByUser[ui.currentUserId].focusMin, startedAt: Date.now(), isRevival:false, roomId: room.id };
  saveUI();
  nav('session');
}
function closeRoomGoal(roomId){
  if(!confirm('ยืนยันปิดเป้าหมายห้องนี้? จะไม่สามารถเพิ่มเวลาต่อได้อีก')) return;
  const room = db.rooms.find(r=>r.id===roomId);
  room.closed = true;
  room.members.forEach(m=>{
    db.sessionsHistory[m.userId] = db.sessionsHistory[m.userId] || [];
    db.sessionsHistory[m.userId].unshift({ id:Date.now()+m.userId, itemName:'สรุปห้อง: '+room.name, dateLabel:'วันนี้', ts:Date.now(), focusMin:m.focusMin, breakMin:m.restMin||0, overrunMin:m.overrunMin||0, status:'completed', roomId:room.id });
  });
  saveDB();
  showToast('ปิดห้องและบันทึกสรุปสถิติให้ทุกคนแล้ว');
  nav('roomSummary');
}
function kickMember(roomId, userId){
  const room = db.rooms.find(r=>r.id===roomId);
  if(room.ownerId !== ui.currentUserId) return;
  if(!confirm('ยืนยันเตะสมาชิกคนนี้ออกจากห้อง?')) return;
  room.members = room.members.filter(m=>m.userId!==userId);
  room.kickedUserIds = room.kickedUserIds || [];
  room.kickedUserIds.push(userId);
  saveDB();
  showToast('เตะสมาชิกออกจากห้องแล้ว');
  render();
}
function leaveRoom(roomId){
  const room = db.rooms.find(r=>r.id===roomId);
  if(!confirm('ยืนยันออกจากห้องนี้?')) return;
  const wasOwner = room.ownerId === ui.currentUserId;
  room.members = room.members.filter(m=>m.userId!==ui.currentUserId);
  if(wasOwner){
    if(room.members.length === 0){
      room.closed = true;
      showToast('คุณเป็นสมาชิกคนสุดท้าย — ห้องถูกปิดอัตโนมัติ (ไม่มีการสรุป Ranking)');
    } else {
      const longest = [...room.members].sort((a,b)=>a.joinedAt-b.joinedAt)[0];
      room.ownerId = longest.userId;
      showToast('ออกจากห้องแล้ว — โอนสิทธิ์เจ้าของห้องให้ '+db.users.find(u=>u.id===longest.userId).username+' อัตโนมัติ');
    }
  } else {
    showToast('ออกจากห้องแล้ว — สถิติเดิมยังอยู่ในประวัติส่วนตัว');
  }
  saveDB();
  nav('roomList');
}
function renderRoomSummary(){
  const room = db.rooms.find(r=>r.id===ui.tempRoomId);
  const sorted = [...room.members].sort((a,b)=>b.focusMin-a.focusMin);
  return `
  ${appbar('สรุปผลห้อง · Ranking สุดท้าย','roomList')}
  <div style="text-align:center; font-size:44px;">🎉</div>
  <div class="card">
    ${sorted.map((m,idx)=>{ const u=db.users.find(x=>x.id===m.userId); return `
      <div class="list-row" style="flex-wrap:wrap;">
        <span>${idx+1}. ${u.username}</span>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <span class="chip chip-blue">🎯${m.focusMin}</span>
          <span class="chip chip-green">☕${m.restMin||0}</span>
          <span class="chip chip-red">⏰${m.overrunMin||0}</span>
        </div>
      </div>`;}).join('')}
  </div>
  <div style="height:14px;"></div>
  <button class="btn btn-primary btn-block" onclick="nav('roomList')">กลับหน้ารายการห้อง</button>`;
}

/* ══════════════════════════════════════════════════════════════════
   10. SCREENS — เพื่อน (UC-21 เพิ่มเพื่อน (คำขอ+ตอบรับ) / UC-35 ยกเลิกคำขอ/ลบเพื่อน)
   ══════════════════════════════════════════════════════════════════ */
function renderFriends(){
  const f = db.friends[ui.currentUserId];
  return `
  ${appbar('เพื่อน','home')}
  <div class="card">
    <div class="field"><label>ค้นหาผู้ใช้ (ชื่อ/รหัส)</label><input id="friendSearch" type="text" placeholder="เช่น ploy"></div>
    <div id="friendSearchResult"></div>
    <div style="height:10px;"></div>
    <button class="btn btn-primary btn-block" onclick="searchFriend()">ค้นหา</button>
  </div>
  <div style="height:14px;"></div>
  <div class="card">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">คำขอที่ได้รับ</div>
    ${f.incoming.length===0? `<p style="font-size:12px; color:var(--ink-soft);">ไม่มีคำขอเข้ามา</p>` :
    f.incoming.map(fid=>{ const u=db.users.find(x=>x.id===fid); return `
      <div class="list-row"><span>${u.username}</span>
        <div style="display:flex; gap:6px;">
          <button class="btn btn-success" style="padding:5px 10px;" onclick="acceptFriendRequest(${fid})">ยอมรับ</button>
          <button class="btn btn-danger" style="padding:5px 10px;" onclick="declineFriendRequest(${fid})">ปฏิเสธ</button>
        </div>
      </div>`;}).join('')}
  </div>
  <div style="height:14px;"></div>
  <div class="card">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">คำขอที่ส่งไป (รอตอบรับ)</div>
    ${f.outgoing.length===0? `<p style="font-size:12px; color:var(--ink-soft);">ไม่มีคำขอที่ส่งไป</p>` :
    f.outgoing.map(fid=>{ const u=db.users.find(x=>x.id===fid); return `
      <div class="list-row"><span>${u.username}</span><button class="btn btn-secondary" style="padding:5px 10px;" onclick="cancelOutgoingRequest(${fid})">ยกเลิกคำขอ</button></div>`;}).join('')}
  </div>
  <div style="height:14px;"></div>
  <div class="card">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">รายชื่อเพื่อน</div>
    ${f.friends.map(fid=>{ const u=db.users.find(x=>x.id===fid); const av=db.avatars[fid]; return `
      <div class="list-row">
        <span>${u.username} <span class="chip chip-gold">🔥 ${av?av.streak:0}</span></span>
        <button class="btn btn-danger" style="padding:5px 10px;" onclick="removeFriend(${fid})">ลบเพื่อน</button>
      </div>`;}).join('') || `<p style="font-size:12px; color:var(--ink-soft);">ยังไม่มีเพื่อน</p>`}
  </div>
  ${bottomNav('friends')}`;
}
function searchFriend(){
  const q = document.getElementById('friendSearch').value.trim().toLowerCase();
  const found = db.users.find(u=>u.username.toLowerCase()===q && u.id!==ui.currentUserId);
  const box = document.getElementById('friendSearchResult');
  if(!q){ box.innerHTML=''; return; }
  if(!found){ box.innerHTML = fieldError('ไม่พบผู้ใช้ที่ค้นหา'); return; }
  const f = db.friends[ui.currentUserId];
  if(f.friends.includes(found.id)){ box.innerHTML = `<p style="font-size:12px; color:var(--ink-soft); margin-top:6px;">เป็นเพื่อนกันอยู่แล้ว</p>`; return; }
  if(f.outgoing.includes(found.id)){ box.innerHTML = `<p style="font-size:12px; color:var(--ink-soft); margin-top:6px;">ส่งคำขอไปแล้ว รอตอบรับ</p>`; return; }
  box.innerHTML = `<div class="list-row" style="margin-top:6px;"><span>${found.username}</span><button class="btn btn-primary" style="padding:6px 10px;" onclick="sendFriendRequest(${found.id})">ส่งคำขอ</button></div>`;
}
function sendFriendRequest(targetId){
  const f = db.friends[ui.currentUserId];
  if(f.outgoing.includes(targetId) || f.friends.includes(targetId)) return;
  f.outgoing.push(targetId);
  db.friends[targetId] = db.friends[targetId] || {friends:[],outgoing:[],incoming:[]};
  db.friends[targetId].incoming.push(ui.currentUserId);
  saveDB();
  showToast('ส่งคำขอเป็นเพื่อนแล้ว รอการตอบรับ');
  render();
}
function acceptFriendRequest(fromId){
  const me = db.friends[ui.currentUserId];
  const other = db.friends[fromId];
  me.incoming = me.incoming.filter(x=>x!==fromId);
  if(other) other.outgoing = other.outgoing.filter(x=>x!==ui.currentUserId);
  me.friends.push(fromId);
  if(other) other.friends.push(ui.currentUserId);
  saveDB();
  showToast('รับคำขอเป็นเพื่อนแล้ว');
  render();
}
function declineFriendRequest(fromId){
  const me = db.friends[ui.currentUserId];
  const other = db.friends[fromId];
  me.incoming = me.incoming.filter(x=>x!==fromId);
  if(other) other.outgoing = other.outgoing.filter(x=>x!==ui.currentUserId);
  saveDB();
  showToast('ปฏิเสธคำขอแล้ว');
  render();
}
function cancelOutgoingRequest(targetId){
  const me = db.friends[ui.currentUserId];
  const other = db.friends[targetId];
  me.outgoing = me.outgoing.filter(x=>x!==targetId);
  if(other) other.incoming = other.incoming.filter(x=>x!==ui.currentUserId);
  saveDB();
  showToast('ยกเลิกคำขอแล้ว');
  render();
}
function removeFriend(fid){
  if(!confirm('ยืนยันลบเพื่อนคนนี้?')) return;
  db.friends[ui.currentUserId].friends = db.friends[ui.currentUserId].friends.filter(x=>x!==fid);
  const other = db.friends[fid];
  if(other) other.friends = other.friends.filter(x=>x!==ui.currentUserId);
  saveDB(); render();
}

/* ══════════════════════════════════════════════════════════════════
   11. SCREENS — ประวัติ/สถิติ (UC-22: ตัวกรองช่วงเวลา + แยกตามรายการที่โฟกัส)
   ══════════════════════════════════════════════════════════════════ */
function renderHistory(){
  const period = ui._historyPeriod || 'all';
  const all = db.sessionsHistory[ui.currentUserId] || [];
  const now = Date.now();
  const cutoffs = { today: now - 24*3600000, week: now - 7*24*3600000, month: now - 30*24*3600000, all: 0 };
  const hist = all.filter(s => (s.ts||now) >= cutoffs[period]);
  const totalFocus = hist.reduce((a,s)=>a+s.focusMin,0);
  const totalBreak = hist.reduce((a,s)=>a+s.breakMin,0);
  const totalOverrun = hist.reduce((a,s)=>a+s.overrunMin,0);
  const byItem = {};
  hist.forEach(s=>{ byItem[s.itemName] = byItem[s.itemName] || {focus:0,brk:0,over:0}; byItem[s.itemName].focus+=s.focusMin; byItem[s.itemName].brk+=s.breakMin; byItem[s.itemName].over+=s.overrunMin; });
  const periods = [['today','วันนี้'],['week','7 วัน'],['month','30 วัน'],['all','ทั้งหมด']];
  return `
  ${appbar('ประวัติ / สถิติ','home')}
  <div class="card" style="display:flex; gap:6px; flex-wrap:wrap;">
    ${periods.map(([k,label])=>`<button class="chip ${period===k?'chip-blue':''}" style="border:none; cursor:pointer;" onclick="setHistoryPeriod('${k}')">${label}</button>`).join('')}
  </div>
  <div style="height:10px;"></div>
  <div class="card" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; text-align:center;">
    <div><div style="font-size:18px; font-weight:800;">${totalFocus}</div><div style="font-size:10px; color:var(--ink-soft);">โฟกัส (นาที)</div></div>
    <div><div style="font-size:18px; font-weight:800;">${totalBreak}</div><div style="font-size:10px; color:var(--ink-soft);">พัก (นาที)</div></div>
    <div><div style="font-size:18px; font-weight:800;">${totalOverrun}</div><div style="font-size:10px; color:var(--ink-soft);">เบรกเกิน (นาที)</div></div>
  </div>
  <div style="height:14px;"></div>
  <div class="card">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">แยกตามรายการที่โฟกัส</div>
    ${Object.keys(byItem).length===0? `<p style="font-size:12px; color:var(--ink-soft);">ยังไม่มีข้อมูลในช่วงเวลานี้</p>` :
    Object.entries(byItem).map(([name,v])=>`
      <div class="list-row"><span>${name}</span><span style="font-size:11px; color:var(--ink-soft);">โฟกัส ${v.focus} · พัก ${v.brk} · เกิน ${v.over} นาที</span></div>`).join('')}
  </div>
  <div style="height:14px;"></div>
  <div class="card">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">รายการเซสชันย้อนหลัง</div>
    ${hist.length===0? `<p style="font-size:12px; color:var(--ink-soft);">ยังไม่มีข้อมูลในช่วงเวลานี้</p>` :
    hist.map(s=>`
      <div class="list-row">
        <div><div style="font-weight:700; font-size:13px;">${s.itemName}</div><div style="font-size:11px; color:var(--ink-soft);">${s.dateLabel} · ${s.focusMin} นาที${s.roomId?' · ห้องโฟกัส':''}</div></div>
        <span class="chip ${s.status==='completed'?'chip-green':'chip-red'}">${s.status==='completed'?'สำเร็จ':'ยกเลิกกลางทาง'}</span>
      </div>`).join('')}
  </div>
  ${bottomNav('history')}`;
}
function setHistoryPeriod(p){ ui._historyPeriod = p; render(); }

/* ══════════════════════════════════════════════════════════════════
   12. SCREENS — ผู้ดูแลระบบ (UC-26 ไอเทม/อัตราดรอป, UC-27 รูปแบบอวตาร)
   ══════════════════════════════════════════════════════════════════ */
function renderAdminDash(){
  const s = db.adminStatsSeed;
  return `
  ${appbar('แดชบอร์ดสถิติระบบ')}
  <button class="btn btn-ghost" style="padding:6px 10px; margin-bottom:10px;" onclick="logout()">ออกจากระบบ (UC-32)</button>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
    <div class="card"><div style="font-size:20px; font-weight:800;">${s.sessionCount}</div><div style="font-size:11px; color:var(--ink-soft);">เซสชันทั้งหมด</div></div>
    <div class="card"><div style="font-size:20px; font-weight:800;">${s.totalFocusMin}</div><div style="font-size:11px; color:var(--ink-soft);">นาทีโฟกัสรวม</div></div>
    <div class="card"><div style="font-size:20px; font-weight:800;">${s.successRate}% / ${s.cancelRate}%</div><div style="font-size:11px; color:var(--ink-soft);">สำเร็จ / ยกเลิกกลางทาง</div></div>
    <div class="card"><div style="font-size:20px; font-weight:800;">${s.unconsciousCount} / ${s.revivedCount}</div><div style="font-size:11px; color:var(--ink-soft);">หมดสติ / ชุบชีวิตสำเร็จ</div></div>
  </div>
  <div style="height:14px;"></div>
  <div class="card">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">สมาชิกใหม่ (4 สัปดาห์ล่าสุด)</div>
    <div style="display:flex; align-items:flex-end; gap:8px; height:70px;">
      ${s.newMembersRange.map(v=>`<div style="flex:1; background:linear-gradient(180deg,var(--coral-1),var(--coral-2)); border-radius:6px 6px 0 0; height:${v*8}px;"></div>`).join('')}
    </div>
  </div>
  <div style="height:14px;"></div>
  <div class="card">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">อัตราดรอปปัจจุบัน (UC-26)</div>
    ${BOX_TIERS.map(t=>`
      <div style="font-size:11px; margin-bottom:4px;"><b>${BOX_LABEL[t]}</b>: ${RARITIES.map(r=>RARITY_LABEL[r]+' '+db.dropTables[t][r]+'%').join(' · ')}</div>`).join('')}
  </div>
  ${adminNav('adminDash')}`;
}

function renderItemMgmt(){
  return `
  ${appbar('จัดการไอเทม / อัตราดรอป')}
  ${BOX_TIERS.map(t=>{
    const table = db.dropTables[t];
    const sum = RARITIES.reduce((a,r)=>a+table[r],0);
    return `
    <div class="card" style="margin-bottom:10px;">
      <div style="font-weight:800; font-size:13px; margin-bottom:8px;">${BOX_LABEL[t]}</div>
      ${RARITIES.map(r=>`
        <div class="list-row"><span>${RARITY_LABEL[r]}</span>
          <input type="number" value="${table[r]}" style="width:56px; border:2px solid #EFE6DC; border-radius:8px; padding:4px 6px;" onchange="updateDropRate('${t}','${r}', this.value)">
        </div>`).join('')}
      <div style="font-size:12px; margin-top:6px; ${sum===100?'color:var(--green-dark);':'color:var(--danger); font-weight:800;'}">ผลรวม: ${sum}%${sum===100?' ✓':' — ต้องเท่ากับ 100%'}</div>
    </div>`;
  }).join('')}
  <div class="card">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">แคตตาล็อกไอเทม (เปิด/ปิดใช้งาน)</div>
    ${db.itemCatalog.map(it=>`
      <div class="list-row">
        <div style="display:flex; align-items:center; gap:8px;"><span style="font-size:18px;">${it.emoji}</span>
          <div style="font-weight:700; font-size:12px;">${it.name}</div></div>
        <label style="font-size:10px;"><input type="checkbox" ${it.active?'checked':''} onchange="toggleItemActive(${it.id})"> เปิดใช้</label>
      </div>`).join('')}
  </div>
  <div style="height:10px;"></div>
  <div class="card">
    <div style="font-weight:800; font-size:13px; margin-bottom:8px;">สูตรผสม (Recipe Table)</div>
    ${db.craftRecipes.map(r=>`<div class="list-row"><span>${r.name}</span><span style="font-size:11px; color:var(--ink-soft); text-align:right;">${r.desc}</span></div>`).join('')}
  </div>
  <div style="height:12px;"></div>
  <button class="btn btn-primary btn-block" onclick="saveItemCatalog()">บันทึกการเปลี่ยนแปลง</button>
  ${adminNav('itemMgmt')}`;
}
function updateDropRate(tier, rarity, val){ db.dropTables[tier][rarity] = parseInt(val)||0; saveDB(); render(); }
function toggleItemActive(id){
  const it = itemById(id);
  it.active = !it.active; saveDB(); render();
}
function saveItemCatalog(){ saveDB(); showToast('บันทึกข้อมูลไอเทม/อัตราดรอปแล้ว — มีผลกับการเปิดกล่อง/ผสมครั้งถัดไป'); }

function renderAvatarMgmt(){
  return `
  ${appbar('จัดการรูปแบบอวตาร')}
  <div class="card">
    ${db.avatarSkins.map(s=>`
      <div class="list-row">
        <div style="display:flex; align-items:center; gap:8px;"><span style="font-size:24px;">${s.emoji}</span><span style="font-weight:700; font-size:13px;">${s.name}</span></div>
        <label style="font-size:11px;"><input type="checkbox" ${s.active?'checked':''} onchange="toggleSkinActive(${s.id})"> เปิดใช้</label>
      </div>`).join('')}
  </div>
  <div style="height:10px;"></div>
  <p style="font-size:11px; color:var(--ink-soft);">ปิดใช้งานจะซ่อนจากบัญชีใหม่เท่านั้น สมาชิกเดิมที่ใช้อยู่ไม่ได้รับผลกระทบ (ระบบเตือนก่อนหากเหลือน้อยกว่า 3 แบบ)</p>
  ${adminNav('avatarMgmt')}`;
}
function toggleSkinActive(id){
  const s = db.avatarSkins.find(x=>x.id===id);
  const activeCount = db.avatarSkins.filter(x=>x.active).length;
  if(s.active && (activeCount-1) < 3){
    if(!confirm('ปิดใช้งานแล้วจะเหลือตัวเลือกสำหรับสมาชิกใหม่น้อยกว่า 3 แบบ ยืนยันปิดใช้งานหรือไม่?')) return;
  }
  s.active = !s.active; saveDB(); render();
}

/* ══════════════════════════════════════════════════════════════════
   13. ROUTER
   ══════════════════════════════════════════════════════════════════ */
const renderers = {
  welcome: renderWelcome, register: renderRegister, login: renderLogin, forgotPassword: renderForgotPassword, createAvatar: renderCreateAvatar,
  home: renderHome, focusList: renderFocusList, settings: renderSettings, editProfile: renderEditProfile, avatarEquip: renderAvatarEquip,
  session: renderSession, summary: renderSummary, break: renderBreak, revival: renderRevival,
  inventory: renderInventory, lootbox: renderLootbox, crafting: renderCrafting,
  roomList: renderRoomList, createRoom: renderCreateRoom, joinRoom: renderJoinRoom, roomView: renderRoomView, roomSummary: renderRoomSummary,
  friends: renderFriends, history: renderHistory,
  adminDash: renderAdminDash, itemMgmt: renderItemMgmt, avatarMgmt: renderAvatarMgmt
};
function render(){
  if(ui.screen!=='session') clearInterval(sessionTicker);
  if(ui.screen!=='break') clearInterval(breakTicker);
  const html = renderers[ui.screen] ? renderers[ui.screen]() : renderWelcome();
  const root = document.getElementById('screen-root');
  root.innerHTML = html;
  root.classList.remove('screen-enter'); void root.offsetWidth; root.classList.add('screen-enter');
}
render();
</script>
</body>
</html>
